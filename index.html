<html>
    <head>
        <title>Form for students</title>
        <link rel="stylesheet" href="../asset/style.css">
    </head>
    <body>

        <div class="form-container">
        <h2>Student Details</h2>
       
        <form id="studentForm" novalidate>
            <!-- Full Name -->
            <div class="form-group">
                <label for="fullName">Full Name</label>
                <input type="text" id="fullName" placeholder="Your Name">
                <div class="error-message" id="nameError">Please enter your full name.</div>
            </div>

            <!-- Date of Birth -->
            <div class="form-group">
                <label for="dob">Date of Birth</label>
                <input type="date" id="dob">
                <div class="error-message" id="dobError">Please select your date of birth.</div>
            </div>

             <!-- Gender -->
            <div class="form-group">
                <label>Gender</label>
                <div class="radio-group">
                    <label class="radio-label"><input type="radio" name="gender" value="Male"> Male</label>
                    <label class="radio-label"><input type="radio" name="gender" value="Female"> Female</label>
                    <label class="radio-label"><input type="radio" name="gender" value="Other"> Other</label>
                </div>
                <div class="error-message" id="genderError">Please select your gender.</div>
            </div>

            <!-- Course Selection -->
            <div class="form-group">
                <label for="course">Enrolled Course</label>
                <select id="course">
                    <option value="">-- Select a Course --</option>
                    <option value="Computer Science">Computer Science</option>
                    <option value="Information Technology">Information Technology</option>
                    <option value="Business Administration">Business Administration</option>
                    <option value="Graphic Design">Graphic Design</option>
                </select>
                <div class="error-message" id="courseError">Please select a course.</div>
            </div>

            <!-- Submit Button -->
            <button type="submit" id="submitBtn">Submit Details</button>
        </form>

         <!-- Success Message UI -->
        <div class="success-box" id="successBox"></div>
    </div>
        
    <script src="../asset/logic.js"></script>
       
    </body>
</html>
